---
layout: default
---
<article class="post">
  <div class="container container--narrow">
    <header class="post-header">
      <time class="post-date" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}<p class="post-subtitle">{{ page.subtitle }}</p>{% endif %}
    </header>
    <div class="post-content">
      {{ content }}
    </div>
    <footer class="post-footer">
      <a href="{{ '/blog' | relative_url }}" class="back-link">&larr; All Posts</a>
    </footer>
  </div>
</article>
